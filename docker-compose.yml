services:
  api:
    image: stumpisuter/augur-hakesch-api:dev
    build: ./src/api
    ports:
      - 8000:8000
    command: uvicorn main:app --host 0.0.0.0 --reload
    volumes:
      - ./src/api:/usr/src/app
    env_file: ".env"
    depends_on:
      - redis
    networks:
      - augur-public

  view:
    image: stumpisuter/augur-hakesch-frontend:dev
    build: 
      context: .
      dockerfile: src/frontend/Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
    ports:
      - 3000:3000
    command: node build/index.js
    env_file: ".env"
    networks:
      - augur-public

  worker-heavy-1:
    image: stumpisuter/augur-hakesch-api:dev
    build: ./src/api
    # solo pool: sequential task execution in main process, avoids fork() issues
    # with GDAL/numpy/scipy C extensions that are incompatible with prefork pool
    # restart: unless-stopped keeps worker available if process exits unexpectedly
    # (optional shutdown-after-task can be enabled via env var if needed)
    command: celery -A calculations.calculations.app worker --pool solo -Q heavy --concurrency=1 --loglevel=info --hostname=worker-heavy-1@%h
    restart: unless-stopped
    volumes:
      - ./src/api:/usr/src/app
    env_file: ".env"
    environment:
      # Use jemalloc to prevent "double free or corruption" from GDAL/numpy C extensions
      - LD_PRELOAD=/usr/lib/x86_64-linux-gnu/libjemalloc.so.2
      # Keep worker running after prepare_discharge_hydroparameters by default.
      - CELERY_SHUTDOWN_AFTER_PREPARE_DISCHARGE=false
    depends_on:
      - api
      - redis
    deploy:
      resources:
        limits:
          memory: 16g
        reservations:
          memory: 8g
    networks:
      - augur-public

  worker-heavy-2:
    image: stumpisuter/augur-hakesch-api:dev
    build: ./src/api
    command: celery -A calculations.calculations.app worker --pool solo -Q heavy --concurrency=1 --loglevel=info --hostname=worker-heavy-2@%h
    restart: unless-stopped
    volumes:
      - ./src/api:/usr/src/app
    env_file: ".env"
    environment:
      - LD_PRELOAD=/usr/lib/x86_64-linux-gnu/libjemalloc.so.2
      - CELERY_SHUTDOWN_AFTER_PREPARE_DISCHARGE=false
    depends_on:
      - api
      - redis
    deploy:
      resources:
        limits:
          memory: 16g
        reservations:
          memory: 8g
    networks:
      - augur-public

  worker-heavy-3:
    image: stumpisuter/augur-hakesch-api:dev
    build: ./src/api
    command: celery -A calculations.calculations.app worker --pool solo -Q heavy --concurrency=1 --loglevel=info --hostname=worker-heavy-3@%h
    restart: unless-stopped
    volumes:
      - ./src/api:/usr/src/app
    env_file: ".env"
    environment:
      - LD_PRELOAD=/usr/lib/x86_64-linux-gnu/libjemalloc.so.2
      - CELERY_SHUTDOWN_AFTER_PREPARE_DISCHARGE=false
    depends_on:
      - api
      - redis
    deploy:
      resources:
        limits:
          memory: 16g
        reservations:
          memory: 8g
    networks:
      - augur-public

  worker-light:
    image: stumpisuter/augur-hakesch-api:dev
    build: ./src/api
    command: celery -A calculations.calculations.app worker --pool solo -Q light --concurrency=1 --loglevel=info --logfile=./logs/celery-light.log
    restart: unless-stopped
    volumes:
      - ./src/api:/usr/src/app
    env_file: ".env"
    environment:
      # Use jemalloc to prevent "double free or corruption" from GDAL/numpy C extensions
      - LD_PRELOAD=/usr/lib/x86_64-linux-gnu/libjemalloc.so.2
    depends_on:
      - api
      - redis
    deploy:
      resources:
        limits:
          memory: 8g
        reservations:
          memory: 4g
    networks:
      - augur-public


  redis:
    image: redis:8.2.1
    networks:
      - augur-public

  dashboard:
    build: ./src/api
    command: celery --broker=redis://redis:6379/0 flower --port=5555
    ports:
      - 5556:5555
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - api
      - redis
      - worker-heavy-1
      - worker-heavy-2
      - worker-heavy-3
      - worker-light
    networks:
      - augur-public

networks:
  augur-public:
    external: true
